name: Generate Bio Pixel SVG

on:
  workflow_dispatch:
    inputs:
      organism_query:
        description: 'Organism to pixelate (e.g., Callus callus domesticus, Canis lupus familiaris)'
        required: true
        default: 'Mus musculus'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the SVG back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Generate SVG
        # We use ts-node to run the typescript file directly
        run: npx ts-node src/cli.ts "${{ github.event.inputs.organism_query }}"

      - name: Commit and Push SVG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/organism.svg
          git commit -m "Update organism SVG: ${{ github.event.inputs.organism_query }}" || echo "No changes to commit"
          git push
