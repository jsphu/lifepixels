name: 'Lifepixels SVG Generator'
description: 'Generates a GitHub-dark style pixel art SVG of an organism'
inputs:
  organism_query:
    description: 'Organism to search for (scientific names; e.g. "Canis lupus familiaris")'
    required: true
    default: 'Mus musculus'
  output_path:
    description: 'Output file path for svg file'
    required: true
    default: './dist/organism.svg'
runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install Dependencies
      run: npm install
      shell: bash
      working-directory: ${{ github.action_path }}
    - name: Run Generator
      run: npx ts-node src/index.ts "${{ inputs.organism_query }}" "${{ inputs.output_path }}"
      shell: bash
      working-directory: ${{ github.action_path }}
