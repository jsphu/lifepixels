name: 'Lifepixels SVG Generator'
description: 'Generates a GitHub-dark style pixel art SVG of an organism'
inputs:
  organism_query:
    description: 'Organism to search for (scientific names; e.g. "Canis lupus familiaris")'
    required: true
    default: 'Mus musculus'
runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install Dependencies
      # We run this in the directory where the action's code is located
      run: npm install
      shell: bash
      working-directory: ${{ github.action_path }}
    - name: Run Generator
      run: npx ts-node src/cli.ts "${{ inputs.organism_query }}"
      shell: bash
      working-directory: ${{ github.action_path }}
    - name: Move Output
      # Move the generated SVG from the action's temp folder to the caller's workspace
      run: cp ${{ github.action_path }}/dist/organism.svg ./organism.svg
      shell: bash
